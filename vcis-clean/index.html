<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=modules/01-dashboard.html">
<title>VCIS — Vendor Contract Intelligence System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b0e1a;color:#e8ecf8;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  .logo{font-size:11px;letter-spacing:.3em;color:#4f7cff;font-weight:600;text-transform:uppercase}
  h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
  p{font-size:12px;color:#7a85b0}
  a{color:#4f7cff;text-decoration:none}.a:hover{text-decoration:underline}
  .dots{display:flex;gap:6px;margin-top:4px}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(79,124,255,.3);animation:pulse 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{background:rgba(79,124,255,.2)}50%{background:#4f7cff}}
</style>
</head>
<body>
  <div class="logo">VCIS Platform</div>
  <h1>Vendor Contract Intelligence</h1>
  <p>Loading dashboard...</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <p style="margin-top:8px;font-size:11px"><a href="modules/01-dashboard.html">Click here if not redirected automatically</a></p>
  <script>
    setTimeout(() => { window.location.href = 'modules/01-dashboard.html'; }, 300);
  </script>
</body>
</html>
