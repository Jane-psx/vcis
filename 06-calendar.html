<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCIS — Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0e1a;--sb:#0f1221;--card:#131729;--card2:#181d35;--border:#1e2444;--border2:#252b4f;--text:#e8ecf8;--muted:#5a6490;--muted2:#7a85b0;--blue:#4f7cff;--blue-dim:rgba(79,124,255,.12);--green:#22c55e;--green-dim:rgba(34,197,94,.12);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);--red:#ef4444;--red-dim:rgba(239,68,68,.12);--purple:#a855f7;--purple-dim:rgba(168,85,247,.12);--font:'Sora',sans-serif;--mono:'DM Mono',monospace;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:var(--sb);flex-shrink:0;gap:8px;position:sticky;top:0;z-index:10}
.top-logo{font-size:11px;letter-spacing:.2em;color:var(--blue);font-weight:600;text-transform:uppercase}
.div{width:1px;height:20px;background:var(--border2);margin:0 4px}
.top-title{font-size:15px;font-weight:600}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border-radius:5px;font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);color:#fff}
.controls-bar{display:flex;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--sb);flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:11px;color:var(--muted2);white-space:nowrap}
.ctrl-sel{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:11px;padding:5px 9px;border-radius:5px;outline:none;cursor:pointer}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted2);cursor:pointer}
.toggle{width:28px;height:16px;background:var(--border2);border-radius:8px;position:relative;transition:background .2s;cursor:pointer}
.toggle.on{background:var(--blue)}
.toggle::after{content:'';width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(12px)}
#page{flex:1;overflow-y:auto;padding:20px 24px}
#page::-webkit-scrollbar{width:4px}
#page::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.section-title{font-size:13px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.fin-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.fin-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.fin-label{font-size:10px;color:var(--muted2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.fin-val{font-size:22px;font-weight:700;font-family:var(--mono)}
.fin-sub{font-size:10px;color:var(--muted2);margin-top:3px}
.fin-val.green{color:var(--green)}.fin-val.amber{color:var(--amber)}.fin-val.red{color:var(--red)}.fin-val.blue{color:var(--blue)}
.gantt-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.gantt-head{display:grid;gap:0;border-bottom:1px solid var(--border);background:var(--sb);padding:0}
.gantt-head-inner{display:grid;grid-template-columns:220px 1fr;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.gh-vendor{padding:8px 14px;border-right:1px solid var(--border)}
.gh-months{display:grid;padding:0}
.month-headers{display:flex}
.month-col{flex:1;text-align:center;padding:8px 4px;font-size:9px;border-right:1px solid var(--border)}
.month-col:last-child{border-right:none}
.gantt-row{display:grid;grid-template-columns:220px 1fr;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.gantt-row:hover{background:rgba(255,255,255,.02)}.gantt-row:last-child{border-bottom:none}
.gr-vendor{padding:10px 14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px}
.gr-name{font-size:12px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gr-score{font-size:10px;padding:2px 6px;border-radius:10px;font-family:var(--mono);font-weight:600;flex-shrink:0}
.sc-red{background:var(--red-dim);color:var(--red)}.sc-amber{background:var(--amber-dim);color:var(--amber)}.sc-green{background:var(--green-dim);color:var(--green)}.sc-blue{background:var(--blue-dim);color:var(--blue)}
.gr-bar{position:relative;padding:10px 8px;display:flex;align-items:center}
.bar-track{width:100%;height:18px;position:relative;background:rgba(30,36,68,.5);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;position:absolute;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden}
.bar-red{background:rgba(239,68,68,.4)}.bar-amber{background:rgba(245,158,11,.4)}.bar-green{background:rgba(34,197,94,.35)}.bar-blue{background:rgba(79,124,255,.35)}
.notice-marker{position:absolute;width:2px;height:100%;background:#ef4444;top:0;opacity:.8}
.notice-tip{position:absolute;font-size:8px;color:var(--red);top:-14px;transform:translateX(-50%);white-space:nowrap}
.strategy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.strat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.strat-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.strat-name{font-size:13px;font-weight:600;flex:1}
.strat-expiry{font-size:10px;color:var(--muted2);margin-top:2px}
.urgency-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.urg-immediate{background:var(--red-dim);color:var(--red)}.urg-soon{background:var(--amber-dim);color:var(--amber)}.urg-plan{background:var(--blue-dim);color:var(--blue)}.urg-monitor{background:var(--green-dim);color:var(--green)}
.strat-bullets{font-size:11px;color:var(--muted2);line-height:1.6;margin-bottom:10px}
.strat-bullet{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px}
.sbullet-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:6px;flex-shrink:0}
.get-strat-btn{width:100%;padding:7px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.25);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.get-strat-btn:hover{background:rgba(168,85,247,.2)}
.prompt-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}
.prompt-modal-bg.open{display:flex}
.prompt-modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;width:520px;max-height:80vh;overflow-y:auto}
.pm-head{padding:16px 20px 13px;border-bottom:1px solid var(--border)}.pm-t{font-size:14px;font-weight:600;margin-bottom:2px}.pm-s{font-size:11px;color:var(--muted2)}
.pm-body{padding:16px 20px}.pm-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.prompt-box{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:11px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.7;max-height:240px;overflow-y:auto;margin-bottom:10px;white-space:pre-wrap}
.copy-btn{width:100%;padding:8px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(79,124,255,.3);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.copy-btn:hover{background:rgba(79,124,255,.2)}
#toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:12px;color:#fff;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:9999;font-weight:500}
#toast.show{opacity:1;transform:translateY(0)}
</style>
<script src="../shared/data.js"></script>
<script>
(function(){var s=null;try{s=JSON.parse(localStorage.getItem('vcis_session')||'null');}catch(e){}if(!s||(Date.now()-s.ts>8*60*60*1000)){window.location.href='01-dashboard.html';}})();
</script>
</head>
<body>
<div class="top-bar">
  <span class="top-logo">VCIS</span><div class="div"></div>
  <span class="top-title">Forecast — 12-Month Renewal Pipeline</span>
  <div class="top-right">
    <button class="btn btn-outline" onclick="VCIS.toast('Exporting forecast as PDF...','#22c55e')">&#8595; Export PDF</button>
    <button class="btn btn-outline" onclick="VCIS.toast('Exporting as Excel...','#22c55e')">&#8595; Export Excel</button>
  </div>
</div>
<div class="controls-bar">
  <span class="ctrl-label">Period:</span>
  <select class="ctrl-sel" id="period-sel" onchange="renderPage()"><option value="6">Next 6 months</option><option value="12" selected>Next 12 months</option><option value="3">Next 3 months</option></select>
  <span class="ctrl-label" style="margin-left:10px">Group by:</span>
  <select class="ctrl-sel" id="group-sel" onchange="renderPage()"><option>None</option><option>Category</option><option>Tier</option></select>
  <div class="toggle-wrap" onclick="toggleITW()" style="margin-left:10px">
    <div class="toggle" id="itw-toggle"></div>
    <span>Show ITW pipeline</span>
  </div>
</div>
<div id="page"></div>
<div class="prompt-modal-bg" id="prompt-modal-bg">
  <div class="prompt-modal">
    <div class="pm-head"><div class="pm-t" id="pm-title">Renewal Strategy Prompt</div><div class="pm-s">Copy and paste into your AI tool for a tailored renewal strategy</div></div>
    <div class="pm-body"><div class="prompt-box" id="pm-prompt"></div><button class="copy-btn" onclick="copyStrat()">&#128203; Copy Renewal Strategy Prompt</button></div>
    <div class="pm-foot"><button class="btn btn-outline" onclick="closePromptModal()">Close</button></div>
  </div>
</div>
<div id="toast"></div>
<script>
const TODAY = new Date();
const VENDORS = [
  {name:'BrightHR Systems',category:'HR Tech',tier:'Gold',adminFee:'6%',expiry:new Date(2026,4,5),autoRenew:'No',terminationNotice:'45 days',score:10,badge:'red',inContractSince:'2024-05-05',contractTerm:'2 years',lastComm:'Apr 9, 2026',notes:'Contract expires May 5. Notice deadline missed. Escalated to legal.',markets:'National',gpo:'',exclusivity:'Exclusive — HR',renewal:'urgent'},
  {name:'Acme Medical Supply',category:'Healthcare',tier:'Gold',adminFee:'8%',expiry:new Date(2026,3,29),autoRenew:'Yes',terminationNotice:'60 days',score:9,badge:'red',inContractSince:'2023-04-29',contractTerm:'3 years',lastComm:'Apr 7, 2026',notes:'Auto-renew active. Annual renewal discussion underway.',markets:'Northeast, Southeast',gpo:'Premier',exclusivity:'Non-exclusive',renewal:'urgent'},
  {name:'TechStart Solutions',category:'IT',tier:'Silver',adminFee:'5%',expiry:new Date(2026,5,15),autoRenew:'No',terminationNotice:'30 days',score:7,badge:'amber',inContractSince:'2024-06-15',contractTerm:'2 years',lastComm:'Apr 3, 2026',notes:'No auto-renew. Initiate renewal by May 15.',markets:'National',gpo:'',exclusivity:'Exclusive — Midwest',renewal:'soon'},
  {name:'Vertex Pharmaceuticals',category:'Healthcare',tier:'Gold',adminFee:'10%',expiry:new Date(2026,7,20),autoRenew:'Yes',terminationNotice:'90 days',score:6,badge:'blue',inContractSince:'2024-08-20',contractTerm:'2 years',lastComm:'Apr 10, 2026',notes:'Renewal in progress. Terms being finalized.',markets:'National',gpo:'Vizient',exclusivity:'Exclusive — Oncology',renewal:'plan'},
  {name:'GrowFast Logistics',category:'Logistics',tier:'Bronze',adminFee:'3%',expiry:new Date(2027,0,10),autoRenew:'Yes',terminationNotice:'90 days',score:4,badge:'green',inContractSince:'2025-01-10',contractTerm:'2 years',lastComm:'Mar 26, 2026',notes:'Auto-renew. Notice required by Oct 2026 if cancelling.',markets:'Midwest, West Coast',gpo:'',exclusivity:'Non-exclusive',renewal:'monitor'},
  {name:'NovaCo Facilities',category:'Facilities',tier:'Silver',adminFee:'4%',expiry:new Date(2025,11,31),autoRenew:'No',terminationNotice:'60 days',score:3,badge:'gray',inContractSince:'2023-12-31',contractTerm:'2 years',lastComm:'Feb 28, 2026',notes:'Contract expired. Renewal decision pending.',markets:'West Coast',gpo:'',exclusivity:'Non-exclusive',renewal:'urgent'},
];
// ITW loaded dynamically
/*
  {name:'MediCare Direct',category:'Healthcare',projStart:new Date(2026,5,1),adminFee:'8%'},
  {name:'SafeGuard Security',category:'Facilities',projStart:new Date(2026,4,15),adminFee:'5%'},
*/
let showITW=false;

function toggleITW(){showITW=!showITW;const t=document.getElementById('itw-toggle');t.classList.toggle('on',showITW);renderPage();}

function daysToExpiry(v){return Math.round((v.expiry-TODAY)/86400000);}
function pctInPeriod(v,months){
  const periodMs=months*30*86400000;
  const startMs=TODAY.getTime();const endMs=startMs+periodMs;
  const expMs=v.expiry.getTime();
  if(expMs<startMs)return 0;
  if(expMs>endMs)return 100;
  return Math.round(((expMs-startMs)/periodMs)*100);
}

function renderPage(){
  const pg=document.getElementById('page');pg.innerHTML='';
  const months=parseInt(document.getElementById('period-sel').value);

  // Financial summary
  const active=VENDORS.filter(v=>daysToExpiry(v)>0);
  const expiring=VENDORS.filter(v=>daysToExpiry(v)>0&&daysToExpiry(v)<=months*30);
  const totalFee=active.length*6;
  const atRisk=expiring.reduce((a,v)=>a+parseFloat(v.adminFee),0).toFixed(1);

  const frow=mk('div','fin-row');
  frow.innerHTML=
    '<div class="fin-card"><div class="fin-label">Active Contracts</div><div class="fin-val blue">'+active.length+'</div><div class="fin-sub">Generating admin fee revenue</div></div>'+
    '<div class="fin-card"><div class="fin-label">Admin Fee at Risk</div><div class="fin-val red">'+atRisk+'%<span style="font-size:14px"> pts</span></div><div class="fin-sub">From '+expiring.length+' expiring contracts</div></div>'+
    '<div class="fin-card"><div class="fin-label">Renewal Confirmed</div><div class="fin-val green">1</div><div class="fin-sub">Vertex Pharma — in progress</div></div>';
  pg.appendChild(frow);

  // Gantt
  const gt=mk('div','');gt.innerHTML='<div class="section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> Contract Timeline — Next '+months+' Months</div>';
  const gw=mk('div','gantt-wrap');
  const ghd=mk('div','gantt-head-inner');
  const ghv=mk('div','gh-vendor');ghv.textContent='Vendor';
  const ghm=mk('div','gh-months');
  const mhRow=mk('div','month-headers');
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(let i=0;i<months;i++){const m=mk('div','month-col');m.textContent=monthNames[(3+i)%12]+(i===0||((3+i)%12===0)?(" '"+(2026+(Math.floor((3+i)/12))).toString().slice(2)):'');mhRow.appendChild(m);}
  ghm.appendChild(mhRow);ghd.appendChild(ghv);ghd.appendChild(ghm);gw.appendChild(ghd);

  const sorted=[...VENDORS].sort((a,b)=>a.expiry-b.expiry);
  sorted.forEach(v=>{
    const days=daysToExpiry(v);
    const barColor=days<0?'bar-gray':days<=30?'bar-red':days<=90?'bar-amber':v.renewal==='plan'?'bar-blue':'bar-green';
    const pct=Math.max(2,Math.min(98,pctInPeriod(v,months)));
    const noticeDays=parseInt(v.terminationNotice)||0;
    const noticeMs=v.expiry.getTime()-noticeDays*86400000;
    const noticePct=Math.max(0,Math.min(100,Math.round(((noticeMs-TODAY.getTime())/(months*30*86400000))*100)));
    const scoreClass=v.score>=8?'sc-red':v.score>=5?'sc-amber':v.badge==='blue'?'sc-blue':'sc-green';

    const row=mk('div','gantt-row');row.onclick=()=>openStratModal(v);
    const rv=mk('div','gr-vendor');rv.innerHTML='<div class="gr-name" title="'+v.name+'">'+v.name+'</div><span class="gr-score '+scoreClass+'">'+v.score+'</span>';
    const rb=mk('div','gr-bar');
    const track=mk('div','bar-track');
    const fill=mk('div','bar-fill '+barColor);fill.style.width=pct+'%';
    const dLabel=days<0?'Expired':'Exp: '+monthNames[v.expiry.getMonth()]+' '+v.expiry.getFullYear();
    fill.textContent=dLabel;
    if(noticeDays>0&&noticePct>=0&&noticePct<=100){
      const marker=mk('div','notice-marker');marker.style.left=noticePct+'%';
      const tip=mk('div','notice-tip');tip.textContent='Notify';marker.appendChild(tip);track.appendChild(marker);
    }
    track.appendChild(fill);rb.appendChild(track);row.appendChild(rv);row.appendChild(rb);gw.appendChild(row);
  });

  if(showITW){
    ITW_PIPELINE.forEach(itw=>{
      const row=mk('div','gantt-row');row.style.opacity='.6';
      const rv=mk('div','gr-vendor');rv.innerHTML='<div class="gr-name" style="font-style:italic">'+itw.name+'</div><span class="gr-score sc-blue">ITW</span>';
      const rb=mk('div','gr-bar');
      const track=mk('div','bar-track');track.style.background='rgba(79,124,255,.05)';track.style.border='1px dashed rgba(79,124,255,.2)';
      const startPct=Math.round(((itw.projStart.getTime()-TODAY.getTime())/(months*30*86400000))*100);
      const fill=mk('div','');fill.style.cssText='position:absolute;left:'+Math.max(0,startPct)+'%;right:0;height:100%;background:rgba(79,124,255,.15);border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:9px;color:var(--blue)';fill.textContent='Projected start';
      track.appendChild(fill);rb.appendChild(track);row.appendChild(rv);row.appendChild(rb);gw.appendChild(row);
    });
  }
  gt.appendChild(gw);pg.appendChild(gt);

  // Strategy cards
  const sc=mk('div','');sc.innerHTML='<div class="section-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> AI Renewal Recommendations</div>';
  const sgrid=mk('div','strategy-grid');
  const expVendors=VENDORS.filter(v=>daysToExpiry(v)<=months*30).sort((a,b)=>a.expiry-b.expiry);
  expVendors.forEach(v=>{
    const days=daysToExpiry(v);
    const urgClass={'urgent':'urg-immediate','soon':'urg-soon','plan':'urg-plan','monitor':'urg-monitor'}[v.renewal]||'urg-monitor';
    const urgLabel={'urgent':'Act Immediately','soon':'Initiate Soon','plan':'Plan Ahead','monitor':'Monitor'}[v.renewal]||'Monitor';
    const bullets=getRenewalBullets(v);
    const card=mk('div','strat-card');
    card.innerHTML='<div class="strat-head"><div><div class="strat-name">'+v.name+'</div><div class="strat-expiry">'+v.category+' · Expires '+(days<0?'(expired)':days+'d')+' · '+v.adminFee+'</div></div><span class="urgency-badge '+urgClass+'">'+urgLabel+'</span></div>'+
      '<div class="strat-bullets">'+bullets.map(b=>'<div class="strat-bullet"><div class="sbullet-dot"></div><span>'+b+'</span></div>').join('')+'</div>'+
      '<button class="get-strat-btn" onclick="openStratModal(VENDORS['+VENDORS.indexOf(v)+'])">&#10024; Get Full AI Strategy Prompt</button>';
    sgrid.appendChild(card);
  });
  sc.appendChild(sgrid);pg.appendChild(sc);
}

function getRenewalBullets(v){
  const days=Math.round((v.expiry-TODAY)/86400000);
  const bullets=[];
  if(days<0)bullets.push('Contract expired '+Math.abs(days)+'d ago — immediate renewal or termination required');
  else if(days<=30)bullets.push('Expiring in '+days+' days — escalate to decision makers now');
  else bullets.push('Expiring in '+days+' days — begin renewal conversations');
  if(v.autoRenew==='No')bullets.push('No auto-renew — manual action required before expiry');
  else bullets.push('Auto-renew active — ensure cancellation notice sent if not renewing');
  bullets.push(v.tier+' tier vendor at '+v.adminFee+' admin fee — '+( parseFloat(v.adminFee)>=8?'high-value contract, prioritize retention':'standard rate, review market benchmarks'));
  return bullets;
}

function openStratModal(v){
  const days=Math.round((v.expiry-TODAY)/86400000);
  document.getElementById('pm-title').textContent='Renewal Strategy — '+v.name;
  const prompt='You are a procurement advisor. Analyze this vendor contract and recommend a renewal strategy.

'+
    'Vendor: '+v.name+'
Category: '+v.category+'
Tier: '+v.tier+'
Admin Fee: '+v.adminFee+'
'+
    'Expiry Date: '+v.expiry.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'
Days to Expiry: '+days+'
'+
    'Auto-Renew: '+v.autoRenew+'
Termination Notice: '+v.terminationNotice+'
Contract Term: '+v.contractTerm+'
'+
    'In Contract Since: '+v.inContractSince+'
Exclusivity: '+v.exclusivity+'
GPO: '+(v.gpo||'N/A')+'
'+
    'Markets: '+v.markets+'
Last Communication: '+v.lastComm+'
Relationship Notes: '+v.notes+'

'+
    'Return ONLY a JSON object:
{
  "strategy_summary": "[2-3 sentence recommendation]",
'+
    '  "urgency": "immediate" | "soon" | "plan_ahead" | "monitor",
'+
    '  "key_actions": [
    { "action": "[what to do]", "timeline": "[when]", "owner": "procurement | legal | finance | management" }
  ],
'+
    '  "negotiation_tips": ["tip 1", "tip 2", "tip 3"],
'+
    '  "risk_if_no_action": "[consequence]",
'+
    '  "estimated_renewal_timeline_days": [number],
'+
    '  "suggested_meeting_date": "[ISO date or null]"
}';
  document.getElementById('pm-prompt').textContent=prompt;
  document.getElementById('prompt-modal-bg').classList.add('open');
}
function closePromptModal(){document.getElementById('prompt-modal-bg').classList.remove('open');}
function copyStrat(){navigator.clipboard.writeText(document.getElementById('pm-prompt').textContent).then(()=>VCIS.toast('Strategy prompt copied!','#22c55e')).catch(()=>VCIS.toast('Copy failed','#ef4444'));}
document.getElementById('prompt-modal-bg').addEventListener('click',e=>{if(e.target.id==='prompt-modal-bg')closePromptModal();});
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function VCIS.toast(msg,color='#4f7cff'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2600);}
renderPage();
</script>
</body>
</html>
