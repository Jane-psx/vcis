<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCIS — Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0e1a;--sb:#0f1221;--card:#131729;--card2:#181d35;--border:#1e2444;--border2:#252b4f;--text:#e8ecf8;--muted:#5a6490;--muted2:#7a85b0;--blue:#4f7cff;--blue-dim:rgba(79,124,255,.12);--green:#22c55e;--green-dim:rgba(34,197,94,.12);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);--red:#ef4444;--red-dim:rgba(239,68,68,.12);--purple:#a855f7;--purple-dim:rgba(168,85,247,.12);--teal:#14b8a6;--teal-dim:rgba(20,184,166,.12);--font:'Sora',sans-serif;--mono:'DM Mono',monospace;}
.div{width:1px;height:20px;background:var(--border2);margin:0 4px}
.cal-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
.cal-nav-btn{background:var(--card);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:5px;cursor:pointer;font-family:var(--font);font-size:12px;transition:all .15s}.cal-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.cal-month{font-size:14px;font-weight:600;min-width:160px;text-align:center}
.view-tabs{display:flex;gap:2px;margin-left:12px}
.view-tab{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--muted2);transition:all .15s}.view-tab:hover{color:var(--text)}.view-tab.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(79,124,255,.3)}
.btn-add{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;margin-left:8px}.btn-add:hover{background:#3d6aff}
.legend-bar{display:flex;gap:16px;padding:8px 24px;border-bottom:1px solid var(--border);background:var(--sb);flex-shrink:0;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#cal-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.wd-cell{padding:8px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow-y:auto}
.month-grid::-webkit-scrollbar{width:3px}.month-grid::-webkit-scrollbar-thumb{background:var(--border2)}
.day-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;min-height:90px;cursor:pointer;transition:background .1s;position:relative}
.day-cell:nth-child(7n){border-right:none}.day-cell:hover{background:rgba(255,255,255,.02)}
.day-cell.other-month{opacity:.35}
.day-cell.today{background:rgba(79,124,255,.06)}
.day-num{font-size:11px;font-weight:600;margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.day-cell.today .day-num{background:var(--blue);color:#fff}
.ev-pill{font-size:9px;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;line-height:1.4}
.ev-pill:hover{opacity:.8}
.ev-blue{background:rgba(79,124,255,.25);color:#93baff}
.ev-amber{background:rgba(245,158,11,.25);color:#fcd34d}
.ev-red{background:rgba(239,68,68,.3);color:#fca5a5}
.ev-purple{background:rgba(168,85,247,.25);color:#d8b4fe}
.ev-teal{background:rgba(20,184,166,.25);color:#5eead4}
.ev-green{background:rgba(34,197,94,.25);color:#86efac}
.ev-gray{background:rgba(90,100,144,.2);color:var(--muted2)}
.ev-more{font-size:9px;color:var(--muted);cursor:pointer}.ev-more:hover{color:var(--blue)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.panel-overlay.open{opacity:1;pointer-events:all}
.ev-panel{position:fixed;right:0;top:0;width:380px;height:100vh;background:var(--sb);border-left:1px solid var(--border2);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.ev-panel.open{transform:translateX(0)}
.evp-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.evp-info{flex:1}.evp-title{font-size:15px;font-weight:700;margin-bottom:4px}.evp-date{font-size:11px;color:var(--muted2)}
.evp-close{background:var(--card2);border:1px solid var(--border2);color:var(--muted2);cursor:pointer;width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.evp-body{flex:1;overflow-y:auto;padding:14px 18px}
.evp-field{margin-bottom:10px;font-size:12px}
.evp-field-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.evp-field-val{color:var(--text);line-height:1.5}
.evp-actions{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.btn{padding:6px 12px;border-radius:5px;font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25)}.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.type-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;margin-bottom:8px}
#toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:12px;color:#fff;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:9999;font-weight:500}
#toast.show{opacity:1;transform:translateY(0)}

/* ── VCIS SHARED SIDEBAR ─────────────────────────────────────── */
</style>
</head>
<body>


<div class="top-bar">
  <span class="top-logo">VCIS</span><div class="div"></div>
  <span class="top-title" id="top-title">Calendar — April 2026</span>
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="prevMonth()">&#8249;</button>
    <span class="cal-month" id="cal-month-label">April 2026</span>
    <button class="cal-nav-btn" onclick="nextMonth()">&#8250;</button>
    <button class="cal-nav-btn" onclick="goToday()">Today</button>
    <div class="view-tabs">
      <div class="view-tab active" onclick="setView('month',this)">Month</div>
      <div class="view-tab" onclick="setView('week',this)">Week</div>
    </div>
    <button class="btn-add" onclick="toast('Add event via Aria AI assistant','#4f7cff')">+ Add Event</button>
  </div>
</div>
<div class="legend-bar">
  <div class="leg-item"><div class="leg-dot" style="background:#4f7cff"></div>Contact call/meeting</div>
  <div class="leg-item"><div class="leg-dot" style="background:#f59e0b"></div>Contract expiry</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Notice deadline</div>
  <div class="leg-item"><div class="leg-dot" style="background:#a855f7"></div>Addendum review</div>
  <div class="leg-item"><div class="leg-dot" style="background:#14b8a6"></div>Follow-up reminder</div>
  <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>Review/ITW meeting</div>
  <div class="leg-item"><div class="leg-dot" style="background:#5a6490"></div>Personal block</div>
</div>
<div id="cal-body"></div>
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="ev-panel" id="ev-panel">
  <div class="evp-head">
    <div class="evp-info"><div class="evp-title" id="evp-title">—</div><div class="evp-date" id="evp-date">—</div></div>
    <button class="evp-close" onclick="closePanel()">&#10005;</button>
  </div>
  <div class="evp-body" id="evp-body"></div>
  <div class="evp-actions">
    <button class="btn btn-success" onclick="toast('Event marked complete','#22c55e')">&#10003; Mark Complete</button>
    <button class="btn btn-outline" onclick="toast('Rescheduling...','#4f7cff')">Reschedule</button>
    <button class="btn btn-danger" onclick="toast('Event deleted','#ef4444')">Delete</button>
  </div>
</div>
<div id="toast"></div>
<script>
const TODAY = new Date(2026,3,20);
let viewYear=2026,viewMonth=3,currentView='month',selectedEvent=null;

const EVENTS = [
  {id:'e1',title:'Acme Contract Expiry Warning',date:'2026-04-29',type:'expiry',vendor:'Acme Medical Supply',time:'All day',notes:'Contract expires. Renewal proposal must be submitted.',status:'Scheduled',auto:true},
  {id:'e2',title:'BrightHR — URGENT: Contract Expires Soon',date:'2026-05-05',type:'expiry',vendor:'BrightHR Systems',time:'All day',notes:'Critical expiry. Notice deadline already passed.',status:'Scheduled',auto:true},
  {id:'e3',title:'Notice Deadline — BrightHR Systems',date:'2026-03-21',type:'notice',vendor:'BrightHR Systems',time:'All day',notes:'MISSED — 45-day notice window has passed.',status:'Overdue',auto:true},
  {id:'e4',title:'Call with Anna Cruz',date:'2026-04-21',type:'call',vendor:'BrightHR Systems',time:'10:00 AM',notes:'Follow-up on addendum terms. Bring proposal document.',status:'Scheduled',auto:false},
  {id:'e5',title:'Addendum Review — Vertex Pharma',date:'2026-04-22',type:'addendum',vendor:'Vertex Pharmaceuticals',time:'2:00 PM',notes:'Review renewal addendum with legal team.',status:'Scheduled',auto:false},
  {id:'e6',title:'Follow-up — TechStart Solutions',date:'2026-04-18',type:'followup',vendor:'TechStart Solutions',time:'11:00 AM',notes:'Initiate renewal conversation with Sarah Chen.',status:'Completed',auto:false},
  {id:'e7',title:'Acme Annual Review',date:'2026-04-21',type:'review',vendor:'Acme Medical Supply',time:'3:00 PM',notes:'Annual performance review and contract renewal discussion.',status:'Scheduled',auto:false},
  {id:'e8',title:'Pricing Sheet Deadline — MediCare Direct',date:'2026-04-30',type:'review',vendor:'MediCare Direct (ITW)',time:'5:00 PM',notes:'Deadline to send pricing sheet to prospect.',status:'Scheduled',auto:true},
  {id:'e9',title:'TechStart Expiry Warning',date:'2026-06-15',type:'expiry',vendor:'TechStart Solutions',time:'All day',notes:'Contract expires Jun 15. No auto-renew.',status:'Scheduled',auto:true},
  {id:'e10',title:'Renewal Planning — Acme Medical',date:'2026-01-29',type:'review',vendor:'Acme Medical Supply',time:'All day',notes:'90-day renewal planning trigger.',status:'Completed',auto:true},
  {id:'e11',title:'Deep work block',date:'2026-04-22',type:'block',vendor:null,time:'9:00 AM – 12:00 PM',notes:'Focus time — no meetings.',status:'Scheduled',auto:false},
  {id:'e12',title:'Vertex Renewal Meeting',date:'2026-05-02',type:'call',vendor:'Vertex Pharmaceuticals',time:'1:00 PM',notes:'Renewal strategy meeting — terms negotiation.',status:'Scheduled',auto:false},
  {id:'e13',title:'Follow-up — Acme Medical Supply',date:'2026-04-25',type:'followup',vendor:'Acme Medical Supply',time:'All day',notes:'Follow-up due — contract renewal discussion.',status:'Scheduled',auto:true},
  {id:'e14',title:'GrowFast Q1 Review',date:'2026-05-10',type:'review',vendor:'GrowFast Logistics',time:'2:00 PM',notes:'Quarterly performance review.',status:'Scheduled',auto:false},
];

const TYPE_COLORS = {call:'ev-blue',expiry:'ev-amber',notice:'ev-red',addendum:'ev-purple',followup:'ev-teal',review:'ev-green',block:'ev-gray'};
const TYPE_LABELS = {call:'Contact Call',expiry:'Contract Expiry',notice:'Notice Deadline',addendum:'Addendum Review',followup:'Follow-up',review:'Review Meeting',block:'Personal Block'};
const TYPE_BADGE_STYLE = {call:'background:var(--blue-dim);color:var(--blue)',expiry:'background:var(--amber-dim);color:var(--amber)',notice:'background:var(--red-dim);color:var(--red)',addendum:'background:var(--purple-dim);color:var(--purple)',followup:'background:var(--teal-dim);color:var(--teal)',review:'background:var(--green-dim);color:var(--green)',block:'background:rgba(90,100,144,.15);color:var(--muted2)'};

function getEventsForDate(y,m,d){
  const iso = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  return EVENTS.filter(e=>e.date===iso);
}

function setView(v,el){currentView=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCal();}
function prevMonth(){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderCal();}
function nextMonth(){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderCal();}
function goToday(){viewYear=TODAY.getFullYear();viewMonth=TODAY.getMonth();renderCal();}

function renderCal(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const label=months[viewMonth]+' '+viewYear;
  document.getElementById('cal-month-label').textContent=label;
  document.getElementById('top-title').textContent='Calendar — '+label;
  const body=document.getElementById('cal-body');
  body.innerHTML='';
  if(currentView==='month') renderMonth(body);
  else renderWeek(body);
}

function renderMonth(body){
  const wdRow=mk('div','weekday-row');
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const c=mk('div','wd-cell');c.textContent=d;wdRow.appendChild(c);});
  body.appendChild(wdRow);
  const grid=mk('div','month-grid');
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const prevDays=new Date(viewYear,viewMonth,0).getDate();
  for(let i=0;i<firstDay;i++){
    const cell=mk('div','day-cell other-month');
    const n=mk('div','day-num');n.textContent=prevDays-firstDay+1+i;cell.appendChild(n);grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++){
    const isToday=viewYear===TODAY.getFullYear()&&viewMonth===TODAY.getMonth()&&d===TODAY.getDate();
    const cell=mk('div','day-cell'+(isToday?' today':''));
    cell.onclick=()=>toast('Showing events for '+months[viewMonth]+' '+d,'#4f7cff');
    const n=mk('div','day-num');n.textContent=d;cell.appendChild(n);
    const evs=getEventsForDate(viewYear,viewMonth,d);
    const show=evs.slice(0,3);
    show.forEach(ev=>{
      const pill=mk('div','ev-pill '+(TYPE_COLORS[ev.type]||'ev-gray'));
      pill.textContent=ev.title;
      pill.title=ev.title+' · '+ev.time;
      pill.onclick=(e)=>{e.stopPropagation();openPanel(ev);};
      cell.appendChild(pill);
    });
    if(evs.length>3){const m=mk('div','ev-more');m.textContent='+'+(evs.length-3)+' more';cell.appendChild(m);}
    grid.appendChild(cell);
  }
  const remaining=(7-((firstDay+daysInMonth)%7))%7;
  for(let i=1;i<=remaining;i++){const cell=mk('div','day-cell other-month');const n=mk('div','day-num');n.textContent=i;cell.appendChild(n);grid.appendChild(cell);}
  body.appendChild(grid);
}

const months=['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderWeek(body){
  const startOfWeek=new Date(viewYear,viewMonth,TODAY.getDate()-(TODAY.getDay()));
  body.style.overflow='auto';
  body.style.padding='16px 24px';
  const wdays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const hdr=mk('div','');
  hdr.style.cssText='display:grid;grid-template-columns:80px repeat(7,1fr);border-bottom:1px solid var(--border);margin-bottom:0;';
  const blank=mk('div','');blank.style.cssText='padding:8px;font-size:10px;color:var(--muted)';blank.textContent='Time';hdr.appendChild(blank);
  for(let i=0;i<7;i++){
    const d=new Date(startOfWeek);d.setDate(d.getDate()+i);
    const cell=mk('div','');const isT=d.toDateString()===TODAY.toDateString();
    cell.style.cssText='padding:8px;text-align:center;font-size:11px;font-weight:600;color:'+(isT?'var(--blue)':'var(--muted2)');
    cell.textContent=wdays[i]+' '+d.getDate();hdr.appendChild(cell);
  }
  body.appendChild(hdr);
  const times=['8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM'];
  const wgrid=mk('div','');wgrid.style.cssText='display:grid;grid-template-columns:80px repeat(7,1fr);';
  times.forEach(time=>{
    const tl=mk('div','');tl.style.cssText='padding:0 10px;font-size:10px;color:var(--muted);min-height:60px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;font-family:var(--mono)';tl.textContent=time;wgrid.appendChild(tl);
    for(let i=0;i<7;i++){
      const cell=mk('div','');cell.style.cssText='border-left:1px solid var(--border);border-bottom:1px solid var(--border);min-height:60px;padding:3px;';
      const d=new Date(startOfWeek);d.setDate(d.getDate()+i);
      const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const hour=parseInt(time);const ampm=time.includes('PM')&&hour!==12;
      EVENTS.filter(e=>e.date===iso&&e.time&&e.time.includes(String(hour+(ampm?12:0)))).forEach(ev=>{
        const b=mk('div','ev-pill '+(TYPE_COLORS[ev.type]||'ev-gray'));b.textContent=ev.title;b.style.marginBottom='0';b.onclick=()=>openPanel(ev);cell.appendChild(b);
      });
      wgrid.appendChild(cell);
    }
  });
  body.appendChild(wgrid);
}

function openPanel(ev){
  selectedEvent=ev;
  document.getElementById('evp-title').textContent=ev.title;
  document.getElementById('evp-date').textContent=ev.date+' · '+(ev.time||'All day');
  const bStyle=TYPE_BADGE_STYLE[ev.type]||'';
  document.getElementById('evp-body').innerHTML=
    '<div class="type-badge" style="'+bStyle+'">'+TYPE_LABELS[ev.type]+'</div>'+
    '<div class="evp-field"><div class="evp-field-label">Date & Time</div><div class="evp-field-val">'+ev.date+' at '+(ev.time||'All day')+'</div></div>'+
    (ev.vendor?'<div class="evp-field"><div class="evp-field-label">Linked Vendor</div><div class="evp-field-val" style="color:var(--blue)">'+ev.vendor+'</div></div>':'')+
    '<div class="evp-field"><div class="evp-field-label">Status</div><div class="evp-field-val">'+ev.status+'</div></div>'+
    (ev.auto?'<div class="evp-field"><div class="evp-field-val" style="color:var(--muted2);font-size:11px;font-style:italic">&#10024; Auto-generated by system</div></div>':'')+
    '<div class="evp-field"><div class="evp-field-label">Notes</div><div class="evp-field-val">'+ev.notes+'</div></div>';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('ev-panel').classList.add('open');
}
function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('ev-panel').classList.remove('open');}
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function toast(msg,color='#4f7cff'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2600);}
renderCal();
</script>

<script src="../shared/groq.js"></script>
<script src="../shared/nav.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    VCISNav.init({ page: 'calendar', title: 'Calendar', sub: '' });
  });
</script>
</body>
</html>
